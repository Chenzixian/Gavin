  /* ========== 2. 状态管理 ========== */
  function createStore(initial) {
    let state = initial;
    const listeners = new Set();
    return {
      get: () => state,
      set: (patch) => {
        state = typeof patch === 'function' ? patch(state) : { ...state, ...patch };
        listeners.forEach(fn => fn(state));
      },
      subscribe: (fn) => { listeners.add(fn); return () => listeners.delete(fn); },
    };
  }

  const memoryStore = createStore({ records: [], hydrated: false, captureDraft: null });
  const uiStore = createStore({ route: 'home', detailId: null, toast: null, sheet: null });

  /* ========== 2b. IndexedDB 存储层 ========== */
  const DB_NAME = 'memory-anchor-db';
  const DB_VERSION = 1;
  const STORE_NAME = 'records';
  let _db = null;

  function openDB() {
    return new Promise((resolve, reject) => {
      if (_db) { resolve(_db); return; }
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onerror = () => reject(req.error);
      req.onsuccess = () => { _db = req.result; resolve(_db); };
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: 'id' });
        }
      };
    });
  }

  async function dbSaveRecords(records) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      store.clear();
      for (const rec of records) store.put(rec);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  async function dbLoadRecords() {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  }

  async function dbDeleteRecord(id) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  /* ========== 3. 工具函数 ========== */
  function uid() { return 'm' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
  function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])); }

  function formatRelative(ts) {
    const diff = Date.now() - ts;
    const min = Math.floor(diff / 60000);
    if (min < 1) return '刚刚';
    if (min < 60) return min + ' 分钟前';
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + ' 小时前';
    const day = Math.floor(hr / 24);
    if (day < 7) return day + ' 天前';
    const d = new Date(ts);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function formatFullDate(ts) {
    const d = new Date(ts);
    return d.getFullYear() + ' 年 ' + (d.getMonth()+1) + ' 月 ' + d.getDate() + ' 日 ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }

  function compressImage(file, maxSize = 1280, quality = 0.82) {
    return new Promise((resolve, reject) => {
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        try {
          const ratio = Math.min(1, maxSize / Math.max(img.width, img.height));
          const w = Math.round(img.width * ratio);
          const h = Math.round(img.height * ratio);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
          URL.revokeObjectURL(url);
        } catch (e) { reject(e); }
      };
      img.onerror = (e) => { URL.revokeObjectURL(url); reject(e); };
      img.src = url;
    });
  }

  function splitDescription(text) {
    const sentences = text.split(/(?<=[。!?])/).filter(s => s.trim());
    if (sentences.length <= 1) return [text];
    const chunks = [];
    let buf = '';
    for (const s of sentences) {
      if (buf && (buf + s).length > 40) { chunks.push(buf); buf = s; } else { buf += s; }
    }
    if (buf) chunks.push(buf);
    return chunks;
  }

      body: JSON.stringify({
        model: 'glm-4v',
        messages: [{
          role: 'user',
          content: [
            { type: 'text', text: '请仔细观察这张照片，描述照片中的主要物品是什么（名称、颜色、材质、外观特征、所在场景）。如果有多件物品，请重点描述最显眼的那一件。回答要简洁，50字以内。' },
            { type: 'image_url', image_url: { url: photoBase64 } }
          ]
        }],
        max_tokens: 300,
        temperature: 0.3,
      })
    });

    if (!response.ok) {
      const errData = await response.json().catch(() => ({}));
      throw new Error(errData.error?.message || '视觉识别失败: ' + response.status);
    }

    const data = await response.json();
    return data.choices?.[0]?.message?.content?.trim() || '';
  }

  // 步骤2：硅基流动 Qwen2.5-72B 生成故事
  async function generateStoryFromUserInput({ visionResult, objectName, purchaseInfo, meaning }) {
    const prompt = '你是一位温柔的"记忆守护者"。请根据以下信息，用第一人称（以"我"开头）写一段 150-200 字左右的温馨短故事。\n\n【AI 视觉识别结果】\n' + visionResult + '\n\n【用户自述】\n物品名称：' + objectName + '\n购买信息：' + purchaseInfo + '\n对我的意义：' + meaning + '\n\n写作要求：\n1. 以"我"开头，自然地讲述与这件物品的故事\n2. 语言温柔、生活化，像一位老朋友在讲述往事\n3. 可以结合视觉识别中看到的物品特征（颜色、材质、外观）和用户自述的信息\n4. 可以加入触感、气味、声音、温度等感官细节\n5. 不要出现"用户说"、"照片"、"AI"、"识别"、"根据你提供的信息"等词汇\n6. 故事要有情感温度，能打动人心\n7. 直接输出故事正文，不需要标题或引言';

    const response = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SILICONFLOW_API_KEY },
      body: JSON.stringify({
        model: 'Qwen/Qwen2.5-7B-Instruct',
        messages: [{ role: 'user', content: prompt }],
        max_tokens: 600,
        temperature: 0.85,
        top_p: 0.9,
      })
    });
    if (!response.ok) {
      const errData = await response.json().catch(() => ({}));
      throw new Error(errData.error?.message || '故事生成失败: ' + response.status);
    }
    const data = await response.json();
    return data.choices?.[0]?.message?.content?.trim() || '';
  }

    const paragraphs = splitDescription(record.description);
    return '<div class="page-enter" style="display:flex;flex-direction:column;height:100%;overflow:hidden">' +
      renderTopBar({ title: '记忆详情', subtitle: formatRelative(record.createdAt).toUpperCase(), onBack: true }) +
      '<div class="flex-1 overflow-y-auto pb-28 relative z-10">' +
        '<div class="px-5">' +
          '<div class="rounded-2xl overflow-hidden bg-paper-deep shadow-paper"><img src="' + record.photoBase64 + '" alt="' + escapeHtml(record.objectName) + '" class="w-full max-h-[420px] object-contain bg-paper-deep" /></div>' +
          '<div class="mt-5 flex items-center gap-2.5"><div class="seal" style="width:32px;height:32px;font-size:14px">记</div><div><p class="text-[10px] text-ink-mute tracking-[0.3em]">STORY</p><h2 class="font-serif text-[20px] font-semibold text-ink leading-tight">' + escapeHtml(record.objectName) + '</h2></div></div>' +
          (record.purchaseInfo || record.meaning ? '<div class="mt-4 rounded-xl bg-paper-soft border border-line-soft px-4 py-3 text-[12px] text-ink-soft leading-relaxed space-y-1">' + (record.purchaseInfo ? '<p><span class="text-ink-mute">来历：</span>' + escapeHtml(record.purchaseInfo) + '</p>' : '') + (record.meaning ? '<p><span class="text-ink-mute">意义：</span>' + escapeHtml(record.meaning) + '</p>' : '') + '</div>' : '') +
          '<div class="mt-5 relative pl-4"><span class="absolute -left-0.5 top-0 bottom-0 w-px bg-wood-soft/40"></span><div class="desc-prose">' + paragraphs.map(p => '<p>' + escapeHtml(p) + '</p>').join('') + '</div></div>' +
          '<div class="mt-6 text-center"><p class="text-[10px] text-ink-faint tracking-widest">记录于 ' + formatFullDate(record.createdAt) + '</p></div>' +
        '</div>' +
      '</div>' +
      '<div class="absolute bottom-0 left-0 right-0 z-30 px-5 py-3 bg-paper-soft/95 backdrop-blur-md border-t border-line">' +
        '<div class="flex items-center justify-center gap-2">' +
          '<button data-action="edit-memory" class="flex-1 py-2.5 rounded-xl border border-wood/30 bg-white text-wood text-[13px] tracking-wider active:scale-[0.98] transition flex items-center justify-center gap-2">' + ICONS.edit + '<span>修改记忆</span></button>' +
          '<button data-action="delete" class="px-4 py-2.5 rounded-xl border border-line bg-white text-ink-mute text-[13px] tracking-wider active:scale-[0.98] transition flex items-center justify-center gap-2">' + ICONS.trash + '<span>删除</span></button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  function renderAboutPage() {
    return '<div class="page-enter" style="display:flex;flex-direction:column;height:100%;overflow:hidden">' +
      renderTopBar({ title: '关于', subtitle: 'ABOUT' }) +
      '<div class="flex-1 overflow-y-auto pb-24 relative z-10 px-6">' +
        '<div class="pt-2 pb-6 text-center"><div class="inline-flex flex-col items-center"><div class="seal" style="width:56px;height:56px;font-size:24px">记</div><p class="font-serif text-[24px] font-semibold text-ink mt-3 tracking-wide">记忆锚点</p><p class="text-[10px] text-ink-mute tracking-[0.4em] mt-1">MEMORY ANCHOR</p></div></div>' +
        '<div class="rounded-2xl bg-white border border-line-soft p-5 shadow-paper"><p class="font-serif text-[15px] text-ink leading-loose">每件旧物，都记得一段故事。<br/>把镜头对准它，让「记忆守护者」替你记下——<br/>那些触得到的温度、听得见的声音、和再也回不去的下午。</p></div>' +
        '<div class="mt-5 space-y-3.5">' +
          ['📷 拍下一件身边的物品', '✍️ 讲述它的故事（回答三个问题）', '🤖 AI 视觉识别 + 生成故事', '📖 存入你的记忆库'].map(t => '<div class="flex items-start gap-3 p-3.5 rounded-xl bg-paper-soft/60 border border-line-soft"><div class="w-9 h-9 rounded-full bg-wood/10 flex items-center justify-center text-[18px] flex-shrink-0">' + t.split(' ')[0] + '</div><div><p class="font-serif text-[14px] text-ink font-semibold">' + t.split(' ').slice(1).join(' ') + '</p></div></div>').join('') +
        '</div>' +
        '<div class="mt-6 p-4 rounded-xl bg-paper-deep/60 border border-line-soft text-[12px] text-ink-mute leading-relaxed"><p class="font-serif text-ink-soft mb-1.5">关于数据与隐私</p><p>所有照片与文字仅保存在你当前浏览器的本地 IndexedDB 中，不会发送到任何服务器。</p></div>' +
        '<div class="mt-6 text-center text-[10px] text-ink-faint tracking-widest"><p>VERSION · 1.2</p><p class="mt-1">愿你的每一天，都值得被记住</p></div>' +
      '</div>' +
      renderBottomNav() +
    '</div>';
  }

  /* ========== 8. Toast / Sheet ========== */
  function showToast(message, type = 'success') {
    const root = document.getElementById('toast-root');
    const color = type === 'error' ? 'border-red-300 text-red-700' : 'border-wood/30 text-ink-soft';
    root.innerHTML = '<div class="toast-in absolute top-6 left-1/2 -translate-x-1/2 px-4 py-2.5 rounded-full bg-white border ' + color + ' shadow-paper-lg text-[13px] flex items-center gap-2 max-w-[90%]"><span class="w-5 h-5 rounded-full bg-wood/15 text-wood flex items-center justify-center">' + ICONS.check + '</span><span>' + escapeHtml(message) + '</span></div>';
    setTimeout(() => { root.innerHTML = ''; }, 1800);
  }

  function showSheet({ title, message, confirmText = '确认', cancelText = '取消', danger = false, onConfirm }) {
    const root = document.getElementById('sheet-root');
    root.innerHTML = '<div class="sheet-overlay fixed inset-0 z-[70] bg-ink/40 backdrop-blur-sm" data-action="close-sheet"></div>' +
      '<div class="sheet-in fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[420px] z-[80] bg-paper-soft rounded-t-3xl px-5 pt-3 pb-8 shadow-paper-lg">' +
        '<div class="w-10 h-1 bg-line rounded-full mx-auto mb-4"></div>' +
        '<p class="font-serif text-[17px] text-ink font-semibold text-center">' + escapeHtml(title) + '</p>' +
        (message ? '<p class="text-[13px] text-ink-mute text-center mt-2 leading-relaxed">' + escapeHtml(message) + '</p>' : '') +
        '<div class="mt-5 space-y-2.5">' +
          '<button data-action="sheet-confirm" class="w-full py-3 rounded-xl ' + (danger ? 'bg-red-600 text-white' : 'bg-wood text-paper') + ' text-[14px] font-medium tracking-wider active:scale-[0.98] transition">' + escapeHtml(confirmText) + '</button>' +
          '<button data-action="close-sheet" class="w-full py-3 rounded-xl bg-white border border-line text-ink-soft text-[14px] tracking-wider active:scale-[0.98] transition">' + escapeHtml(cancelText) + '</button>' +
        '</div>' +
      '</div>';
    uiStore.set({ sheet: { onConfirm } });
  }

  function closeSheet() {
    document.getElementById('sheet-root').innerHTML = '';
    uiStore.set({ sheet: null });
  }

  function showMemoryEditor(record, onSave) {
    const root = document.getElementById('sheet-root');
    root.innerHTML = '<div class="sheet-overlay fixed inset-0 z-[70] bg-ink/40 backdrop-blur-sm" data-action="close-sheet"></div>' +
      '<div class="sheet-in fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[420px] z-[80] bg-paper-soft rounded-t-3xl px-5 pt-3 pb-8 shadow-paper-lg" style="max-height:90vh;overflow-y:auto">' +
        '<div class="w-10 h-1 bg-line rounded-full mx-auto mb-4"></div>' +
        '<p class="font-serif text-[16px] text-ink font-semibold">修改记忆</p>' +
        '<div class="mt-4 space-y-3">' +
          '<div><label class="block text-[12px] text-ink-soft mb-1 tracking-wide">物品名称</label><textarea id="mem-name" rows="1" maxlength="60" class="w-full p-3 rounded-xl border border-line bg-white text-[14px] text-ink leading-relaxed resize-none">' + escapeHtml(record.objectName || '') + '</textarea></div>' +
          '<div><label class="block text-[12px] text-ink-soft mb-1 tracking-wide">时间/地点</label><textarea id="mem-purchase" rows="2" maxlength="120" class="w-full p-3 rounded-xl border border-line bg-white text-[14px] text-ink leading-relaxed resize-none">' + escapeHtml(record.purchaseInfo || '') + '</textarea></div>' +
          '<div><label class="block text-[12px] text-ink-soft mb-1 tracking-wide">意义</label><textarea id="mem-meaning" rows="2" maxlength="200" class="w-full p-3 rounded-xl border border-line bg-white text-[14px] text-ink leading-relaxed resize-none">' + escapeHtml(record.meaning || '') + '</textarea></div>' +
          '<div><label class="block text-[12px] text-ink-soft mb-1 tracking-wide">故事正文</label><textarea id="mem-desc" rows="6" maxlength="500" class="w-full p-3 rounded-xl border border-line bg-white text-[14px] text-ink leading-relaxed resize-none font-serif">' + escapeHtml(record.description || '') + '</textarea></div>' +
        '</div>' +
        '<div class="mt-4 space-y-2.5">' +
          '<button data-action="memory-save" data-prevent-blur class="w-full py-3 rounded-xl bg-wood text-paper text-[14px] font-medium tracking-wider active:scale-[0.98] transition">保存修改</button>' +
          '<button data-action="close-sheet" class="w-full py-3 rounded-xl bg-white border border-line text-ink-soft text-[14px] tracking-wider active:scale-[0.98] transition">取消</button>' +
        '</div>' +
      '</div>';
    uiStore.set({ sheet: { onSave } });
  }

  /* ========== 9. 动作处理 ========== */
  const handlers = {
    'nav': (el) => navigate(el.dataset.target || '#/'),
    'back': () => { history.length > 1 ? history.back() : navigate('#/'); },
    'open-detail': (el) => navigate('#/detail/' + encodeURIComponent(el.dataset.id)),
    'upload-trigger': (el) => {
      const input = document.getElementById('file-input');
      if (!input) return;
      input.removeAttribute('capture');
      input.click();
    },
    'open-camera': () => {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        // Fallback: use file input with capture
        const input = document.getElementById('file-input');
        if (!input) return;
        input.setAttribute('capture', 'environment');
        input.click();
        return;
      }
      openCamera();
    },
    'close-camera': () => {
      closeCamera();
    },
    'snap-photo': () => {
      takePhoto();
    },
    'switch-camera': () => {
      switchCamera();
    },
    'clear-photo': () => {
      memoryStore.set({ captureDraft: { photoBase64: null, step: 'photo' } });
      const fi = document.getElementById('file-input');
      if (fi) fi.value = '';
    },
    'submit-user-input': async () => {
      const draft = memoryStore.get().captureDraft;
      if (!draft || !draft.photoBase64) return;
      const name = document.getElementById('input-name')?.value.trim();
      const purchase = document.getElementById('input-purchase')?.value.trim();
      const meaning = document.getElementById('input-meaning')?.value.trim();
      if (!name) { showToast('请填写物品名称', 'error'); return; }
      if (!purchase) { showToast('请填写购买信息', 'error'); return; }
      if (!meaning) { showToast('请填写它的意义', 'error'); return; }
      const userInput = { objectName: name, purchaseInfo: purchase, meaning };
      memoryStore.set({ captureDraft: { ...draft, step: 'visioning', userInput } });
      try {
        // 第一步：DeepSeek 视觉识别
        const visionResult = await deepseekVision({ photoBase64: draft.photoBase64 });
        memoryStore.set({ captureDraft: { ...memoryStore.get().captureDraft, step: 'writing', visionResult } });
        // 第二步：DeepSeek 生成故事
        const description = await generateStoryFromUserInput({ visionResult, objectName: name, purchaseInfo: purchase, meaning });
        if (!description) throw new Error('故事内容为空');
        memoryStore.set({ captureDraft: { ...memoryStore.get().captureDraft, description, step: 'done' } });
      } catch (err) {
        memoryStore.set({ captureDraft: { ...memoryStore.get().captureDraft, step: 'error', error: err.message } });
      }
    },
    'retry-generate': async () => {
      const draft = memoryStore.get().captureDraft;
      if (!draft || !draft.userInput || !draft.photoBase64) return;
      memoryStore.set({ captureDraft: { ...draft, step: 'writing', error: null } });
      try {
        const visionResult = await deepseekVision({ photoBase64: draft.photoBase64 });
        memoryStore.set({ captureDraft: { ...memoryStore.get().captureDraft, step: 'writing', visionResult } });
        const description = await generateStoryFromUserInput({ visionResult, objectName: draft.userInput.objectName, purchaseInfo: draft.userInput.purchaseInfo, meaning: draft.userInput.meaning });
        if (!description) throw new Error('故事内容为空');
        memoryStore.set({ captureDraft: { ...memoryStore.get().captureDraft, description, step: 'done' } });
      } catch (err) {
        memoryStore.set({ captureDraft: { ...memoryStore.get().captureDraft, step: 'error', error: err.message } });
      }
    },
    'back-to-info': () => {
      const draft = memoryStore.get().captureDraft;
      if (!draft) return;
      memoryStore.set({ captureDraft: { ...draft, step: 'info' } });
    },
    'regenerate-story': async () => {
      const draft = memoryStore.get().captureDraft;
      if (!draft || !draft.userInput || !draft.photoBase64) return;
      memoryStore.set({ captureDraft: { ...draft, step: 'writing', error: null } });
      try {
        const visionResult = await deepseekVision({ photoBase64: draft.photoBase64 });
        memoryStore.set({ captureDraft: { ...memoryStore.get().captureDraft, step: 'writing', visionResult } });
        const description = await generateStoryFromUserInput({ visionResult, objectName: draft.userInput.objectName, purchaseInfo: draft.userInput.purchaseInfo, meaning: draft.userInput.meaning });
        if (!description) throw new Error('故事内容为空');
        memoryStore.set({ captureDraft: { ...memoryStore.get().captureDraft, description, step: 'done' } });
      } catch (err) {
        memoryStore.set({ captureDraft: { ...memoryStore.get().captureDraft, step: 'error', error: err.message } });
      }
    },
    'save': () => {
      const draft = memoryStore.get().captureDraft;
      if (!draft || draft.step !== 'done' || !draft.description) return;
      const record = {
        id: uid(),
        photoBase64: draft.photoBase64,
        objectName: draft.userInput.objectName,
        purchaseInfo: draft.userInput.purchaseInfo,
        meaning: draft.userInput.meaning,
        description: draft.description,
        createdAt: Date.now(),
      };
      memoryStore.set({ records: [record, ...memoryStore.get().records], captureDraft: null });
      showToast('已存入记忆库');
      setTimeout(() => navigate('#/detail/' + encodeURIComponent(record.id)), 300);
    },
    'delete': () => {
      const { detailId } = uiStore.get();
      if (!detailId) return;
      showSheet({
        title: '删除这段记忆？',
        message: '删除后无法恢复，照片与文字都将从词典中消失。',
        confirmText: '确认删除',
        danger: true,
        onConfirm: async () => {
          memoryStore.set({ records: memoryStore.get().records.filter(r => r.id !== detailId) });
          try { await dbDeleteRecord(detailId); } catch (e) { console.warn('Delete failed:', e); }
          showToast('已删除');
          setTimeout(() => navigate('#/'), 300);
        }
      });
    },
    'edit-memory': () => {
      const { detailId } = uiStore.get();
      if (!detailId) return;
      const rec = memoryStore.get().records.find(r => r.id === detailId);
      if (!rec) return;
      showMemoryEditor(rec, (updated) => {
        memoryStore.set({ records: memoryStore.get().records.map(r => r.id === detailId ? { ...r, ...updated } : r) });
        showToast('记忆已更新');
      });
    },
    'edit-draft-memory': () => {
      const draft = memoryStore.get().captureDraft;
      if (!draft || draft.step !== 'done') return;
      showMemoryEditor({
        objectName: draft.userInput.objectName,
        purchaseInfo: draft.userInput.purchaseInfo,
        meaning: draft.userInput.meaning,
        description: draft.description,
      }, (updated) => {
        memoryStore.set({ captureDraft: { ...draft, userInput: { objectName: updated.objectName, purchaseInfo: updated.purchaseInfo, meaning: updated.meaning }, description: updated.description } });
        showToast('记忆已修改');
      });
    },
    'memory-save': () => {
      const ta1 = document.getElementById('mem-name');
      const ta2 = document.getElementById('mem-purchase');
      const ta3 = document.getElementById('mem-meaning');
      const ta4 = document.getElementById('mem-desc');
      if (!ta1 || !ta2 || !ta3 || !ta4) return;
      const updated = {
        objectName: ta1.value.trim(),
        purchaseInfo: ta2.value.trim(),
        meaning: ta3.value.trim(),
        description: ta4.value.trim(),
      };
      const { sheet } = uiStore.get();
      if (sheet && sheet.onSave) { try { sheet.onSave(updated); } catch (e) { console.error(e); } }
      closeSheet();
    },
    'close-sheet': () => closeSheet(),
    'sheet-confirm': () => {
      const { sheet } = uiStore.get();
      if (sheet && sheet.onConfirm) { try { sheet.onConfirm(); } catch (e) { console.error(e); } }
      closeSheet();
    },
  };

  document.addEventListener('click', (e) => {
    const target = e.target.closest('[data-action]');
    if (!target) return;
    if (target.hasAttribute('data-prevent-blur')) {
      const ae = document.activeElement;
      if (ae && (ae.tagName === 'TEXTAREA' || ae.tagName === 'INPUT')) ae.blur();
    }
    const action = target.dataset.action;
    const handler = handlers[action];
    if (handler) { e.preventDefault(); handler(target); }
  });

  document.addEventListener('change', async (e) => {
    if (e.target && e.target.id === 'file-input') {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      try {
        showToast('正在处理照片');
        const data = await compressImage(file);
        memoryStore.set({ captureDraft: { photoBase64: data, step: 'info' } });
        e.target.value = '';
      } catch (err) {
        console.error(err);
        showToast('图片读取失败', 'error');
      }
    }
  });

  /* ========== 10. 主渲染 ========== */
  function render() {
    const { route } = uiStore.get();
    const page = document.getElementById('page-root');
    let html = '';
    switch (route) {
      case 'capture': html = renderCapturePage(); break;
      case 'detail':  html = renderDetailPage();  break;
      case 'about':   html = renderAboutPage();   break;
      default:        html = renderHomePage();
    }
    page.innerHTML = html;
  }

  uiStore.subscribe(render);
  memoryStore.subscribe(render);

  /* ========== 10.5. 摄像头功能 ========== */
  let _cameraStream = null;
  let _cameraFacing = 'environment';

  function openCamera() {
    const root = document.getElementById('toast-root');
    const modal = document.createElement('div');
    modal.id = 'camera-modal-root';
    modal.style.position = 'fixed';
    modal.style.inset = '0';
    modal.style.zIndex = '200';
    modal.innerHTML =
      '<div class="camera-modal">' +
        '<p class="camera-hint">对准物品，按下方按钮拍照</p>' +
        '<video id="camera-video" autoplay playsinline muted></video>' +
        '<div class="camera-controls">' +
          '<button data-action="close-camera" class="camera-close">' + ICONS.close + '</button>' +
          '<button data-action="snap-photo" class="camera-shutter"></button>' +
          '<button data-action="switch-camera" class="camera-switch">' + ICONS.switch + '</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(modal);

    _startCameraStream();
  }

  function _startCameraStream() {
    const constraints = {
      video: {
        facingMode: _cameraFacing,
        width: { ideal: 1280 },
        height: { ideal: 960 }
      },
      audio: false
    };
    navigator.mediaDevices.getUserMedia(constraints)
      .then((stream) => {
        _cameraStream = stream;
        const video = document.getElementById('camera-video');
        if (video) video.srcObject = stream;
      })
      .catch((err) => {
        console.warn('camera error:', err);
        showToast('无法访问摄像头，请改用相册上传', 'error');
        closeCamera();
      });
  }

  function closeCamera() {
    if (_cameraStream) {
      _cameraStream.getTracks().forEach((t) => t.stop());
      _cameraStream = null;
    }
    const modal = document.getElementById('camera-modal-root');
    if (modal) modal.remove();
  }

  function switchCamera() {
    if (!_cameraStream) return;
    _cameraStream.getTracks().forEach((t) => t.stop());
    _cameraStream = null;
    _cameraFacing = _cameraFacing === 'environment' ? 'user' : 'environment';
    _startCameraStream();
  }

  function takePhoto() {
    const video = document.getElementById('camera-video');
    if (!video || !video.videoWidth) {
      showToast('摄像头尚未就绪，请稍等', 'error');
      return;
    }
    const canvas = document.createElement('canvas');
    const maxW = 1280;
    const scale = Math.min(1, maxW / video.videoWidth);
    canvas.width = video.videoWidth * scale;
    canvas.height = video.videoHeight * scale;
    const ctx = canvas.getContext('2d');
    if (!ctx) { closeCamera(); return; }
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    const draft = memoryStore.get().captureDraft || {};
    memoryStore.set({ captureDraft: { ...draft, photoBase64: dataUrl, step: 'info' } });
    closeCamera();
  }

  /* ========== 11. 启动 ========== */
  (async () => {
    try {
      await hydrate();
      const r = parseRoute();
      uiStore.set({ route: r.route, detailId: r.detailId });
      render();
    } catch (err) {
      const page = document.getElementById('page-root');
      page.innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#c0392b;background:#fef9f9;min-height:100vh"><h2>启动出错</h2><pre style="font-size:13px;word-break:break-all;background:#fff0f0;padding:12px;border-radius:8px">' + (err.stack || err.message) + '</pre><button onclick="location.reload()" style="margin-top:16px;padding:8px 20px;background:#8C6B4A;color:#fff;border:none;border-radius:8px;cursor:pointer">重新加载</button></div>';
    }
  })();
  </script>
